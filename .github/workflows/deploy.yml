name: Deploy to DigitalOcean
on:
  push:
    branches:
      - main
      - dev-isuru

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          password: ${{ secrets.DO_PASSWORD }}
          port: 22
          envs: GITHUB_TOKEN,BRANCH_NAME
          script: |
            # Stop existing containers if running
            # docker compose -f /root/plantation-platform/docker-compose.prod.yml down || true

            # Repo URL with Token Auth
            REPO_URL="https://oauth2:${GITHUB_TOKEN}@github.com/Knoweb/plantation-platform.git"

            # Check if directory exists, if not, clone it (First run mostly)
            if [ ! -d "/root/plantation-platform" ]; then
              git clone -b $BRANCH_NAME $REPO_URL /root/plantation-platform
            else
              # If exists, ensure remote is correct for auth
              cd /root/plantation-platform
              git remote set-url origin $REPO_URL
            fi

            # Navigate to directory
            cd /root/plantation-platform
            
            # Fetch latest
            git fetch origin $BRANCH_NAME
            git reset --hard origin/$BRANCH_NAME
            
            # Start/Restart Services with Zero Downtime Deployment (ZDD)
            # Step 1: Pre-build new images purely in the background
            docker compose -f docker-compose.prod.yml build
            
            # Step 2: Spin up the new V2 containers perfectly alongside the old V1 containers
            # Nginx's built-in docker DNS automatically scales traffic across both immediately
            docker compose -f docker-compose.prod.yml up -d --scale api-gateway=2 --scale frontend=2 --scale tenant-service=2 --scale inventory-service=2 --scale operation-service=2 --no-recreate
            
            # Step 3: Wait 30 seconds for the new Java backend contexts to boot and become perfectly healthy
            sleep 30
            
            # Step 4: Gracefully terminate the old V1 containers leaving only the new ones
            docker compose -f docker-compose.prod.yml up -d --scale api-gateway=1 --scale frontend=1 --scale tenant-service=1 --scale inventory-service=1 --scale operation-service=1 --remove-orphans
            
            # Force restart Nginx to pick up config changes
            docker compose -f docker-compose.prod.yml restart nginx
            
            # Prune unused images to save space
            docker image prune -f
