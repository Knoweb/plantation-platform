server {
    listen 80;
    server_name wevili.com www.wevili.com;

    # Allow Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Route traffic to Frontend (HTTP)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Route API traffic to Gateway (HTTP)
    location /api/ {
        proxy_pass http://api-gateway:8080; # Explicitly include /api in proxy pass? No, gateway handles /api/**
        # If I proxy /api to gateway, Gateway receives /api/... path. Yes.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
