server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "https://www.wevili.com"
              - "http://www.wevili.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        - id: tenant-service
          uri: lb://TENANT-SERVICE
          predicates:
            - Path=/api/tenants/**,/api/divisions/**,/api/workers/**,/api/fields/**,/api/crop-configs/**,/api/daily-costs/**,/api/daily-costs
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/inventory/**
        - id: operation-service
          uri: lb://OPERATION-SERVICE
          predicates:
            - Path=/api/operations/**,/api/messages/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
